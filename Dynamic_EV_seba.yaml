blueprint:
  name: Dinamična avtomatizacija polnjenja EV v2.2
  description: >
    **v2.2 - Odstranjeno sledenje lokacije vozila**
    - Avtomatizacija zdaj deluje samo na podlagi stanja polnjenja
    - Odstranjena odvisnost od device_tracker (ni več preverjanja "doma")

    **v2.1 - Dodana podpora za neobčutljivost na velike/male črke**

    Ta avtomatizacija dinamično prilagaja tok polnjenja električnega vozila glede na trenutno porabo električne energije v hiši. 
    Preprečuje preobremenitev omrežja in optimizira polnjenje.

  domain: automation
  input:
    interval:
      name: Interval prilagajanja (minute)
      description: Kako pogosto naj avtomatizacija preverja porabo in prilagaja tok polnjenja.
      default: /1
      selector:
        select:
          options:
            - label: "1 minuta"
              value: /1
            - label: "3 minute"
              value: /3
            - label: "5 minut"
              value: /5

    sensor_charging:
      name: Senzor stanja polnjenja EV
      description: Senzor, ki kaže, ali se vozilo trenutno polni ali je priključeno.
      default: sensor.feyree_energy
      selector:
        entity:
          domain: sensor

    charger_toggle:
      name: Preklop polnjenja (Start/Stop)
      description: Entiteta, ki vklopi ali izklopi polnjenje (običajno select entity).
      default: select.feyree_charging
      selector:
        entity:
          domain: select

    sensor_house_power:
      name: Senzor skupne porabe hiše
      description: Senzor, ki meri skupno moč porabe celotne hiše v vatih (W).
      default: sensor.p1_meter_power
      selector:
        entity:
          domain: sensor
          device_class: power

    max_grid_power_day:
      name: Največja dovoljena moč čez dan (W)
      default: 4700
      selector:
        number:
          min: 0
          max: 15000
          step: 100

    max_grid_power_night:
      name: Največja dovoljena moč ponoči (W)
      default: 6200
      selector:
        number:
          min: 0
          max: 15000
          step: 100

    charging_current:
      name: Nastavitev toka polnjenja (A)
      description: Number entiteta, ki nastavlja tok polnjenja v amperih.
      default: number.feyree_set_charge_current
      selector:
        entity:
          domain: number

    voltage:
      name: Napetost (V)
      description: Napetost v vašem omrežju (običajno 230V)
      default: 230
      selector:
        number:
          min: 100
          max: 240
          step: 10

    max_amps:
      name: Največji tok polnjenja (A)
      default: 10
      selector:
        number:
          min: 6
          max: 32
          step: 1

    min_amps:
      name: Najmanjši tok polnjenja (A)
      default: 6
      selector:
        number:
          min: 6
          max: 32
          step: 1

    day_time_days:
      name: Delovni dnevi za dnevni režim
      default: ["mon", "tue", "wed", "thu", "fri"]
      selector:
        select:
          multiple: true
          options:
            - label: Ponedeljek
              value: "mon"
            - label: Torek
              value: "tue"
            - label: Sreda
              value: "wed"
            - label: Četrtek
              value: "thu"
            - label: Petek
              value: "fri"
            - label: Sobota
              value: "sat"
            - label: Nedelja
              value: "sun"

    day_time_start:
      name: Ura začetka dnevnega režima
      default: 8
      selector:
        number:
          min: 0
          max: 23
          step: 1

    day_time_end:
      name: Ura konca dnevnega režima
      default: 24
      selector:
        number:
          min: 0
          max: 24
          step: 1

triggers:
  - trigger: time_pattern
    minutes: !input interval

condition:
  - condition: state
    entity_id: !input sensor_charging
    state:
      - 'charging'
      - 'charged'
      - 'plugged_in'
      - 'Charging'
      - 'CHARGING'
      - 'waiting_for_authorization'
      - 'waiting'

action:
  - variables:
      voltage: !input voltage
      max_amps: !input max_amps
      min_amps: !input min_amps
      sensor_house_power_entity: !input sensor_house_power
      charging_current_entity: !input charging_current
      sensor_charging_entity: !input sensor_charging
      charging_current_value: "{{ states(charging_current_entity) | float(0) }}"
      total_consumption: "{{ states(sensor_house_power_entity) | float(0) }}"
      charger_consumption: |-
        {% set state = states(sensor_charging_entity) | lower %}
        {% if state in ['charging', 'plugged_in', 'waiting_for_authorization', 'waiting'] %}
          {{ charging_current_value * voltage }}
        {% else %}
          0
        {% endif %}
      max_grid_power_day: !input max_grid_power_day
      max_grid_power_night: !input max_grid_power_night
      day_time_days: !input day_time_days
      day_time_start: !input day_time_start
      day_time_end: !input day_time_end
      current_day: "{{ ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'][now().weekday()] }}"
      is_day_time: "{{ current_day in day_time_days and day_time_start <= now().hour < day_time_end }}"
      actual_free_power: |-
        {% if is_day_time %}
          {{ [0, max_grid_power_day - total_consumption + charger_consumption] | max }}
        {% else %}
          {{ [0, max_grid_power_night - total_consumption + charger_consumption] | max }}
        {% endif %}

      new_target_value: >-
        {% set raw_amps = (actual_free_power / voltage) | float %}
        {% if raw_amps > max_amps %}
          {{ max_amps | float }}
        {% elif raw_amps < min_amps %}
          0.0
        {% else %}
          {{ raw_amps | int }}
        {% endif %}

  # Vklop/izklop polnjenja
  - service: select.select_option
    target:
      entity_id: !input charger_toggle
    data:
      option: |-
        {% if (actual_free_power / voltage) >= min_amps %}
          on
        {% else %}
          off
        {% endif %}

  # Postopno prilagajanje toka
  - repeat:
      while:
        - condition: template
          value_template: >-
            {% set current = states(charging_current_entity) | float(0)
