blueprint:
  name: Dinamična avtomatizacija polnjenja EV v2.4
  description: >
    **v2.4 - Popravljena za Feyree polnilnik**
    - Condition temelji na select.feyree_charging (stanje "on")
    - sensor.feyree_energy se uporablja samo za energijo (kWh), ne za stanje

    Dinamično prilagajanje toka polnjenja glede na porabo hiše.

  domain: automation
  input:
    interval:
      name: Interval prilagajanja (minute)
      default: /1
      selector:
        select:
          options:
            - label: "1 minuta"
              value: /1
            - label: "3 minute"
              value: /3
            - label: "5 minut"
              value: /5

    charger_toggle:
      name: Preklop polnjenja (Start/Stop)
      description: Select entiteta, ki vklopi/izklopi polnjenje (npr. select.feyree_charging)
      default: select.feyree_charging
      selector:
        entity:
          domain: select

    sensor_house_power:
      name: Senzor skupne porabe hiše (W)
      default: sensor.p1_meter_power
      selector:
        entity:
          domain: sensor
          device_class: power

    charging_current:
      name: Nastavitev toka polnjenja (A)
      default: number.feyree_set_charge_current
      selector:
        entity:
          domain: number

    voltage:
      name: Napetost (V)
      default: 230
      selector:
        number:
          min: 100
          max: 240
          step: 10

    max_amps:
      name: Največji tok polnjenja (A)
      default: 10
      selector:
        number:
          min: 6
          max: 15
          step: 1

    min_amps:
      name: Najmanjši tok polnjenja (A)
      default: 6
      selector:
        number:
          min: 6
          max: 15
          step: 1

    max_grid_power_day:
      name: Največja dovoljena moč čez dan (W)
      default: 4700
      selector:
        number:
          min: 0
          max: 15000
          step: 100

    max_grid_power_night:
      name: Največja dovoljena moč ponoči (W)
      default: 6200
      selector:
        number:
          min: 0
          max: 15000
          step: 100

    day_time_days:
      name: Delovni dnevi za dnevni režim
      default: ["mon", "tue", "wed", "thu", "fri"]
      selector:
        select:
          multiple: true
          options:
            - label: "Ponedeljek"
              value: "mon"
            - label: "Torek"
              value: "tue"
            - label: "Sreda"
              value: "wed"
            - label: "Četrtek"
              value: "thu"
            - label: "Petek"
              value: "fri"
            - label: "Sobota"
              value: "sat"
            - label: "Nedelja"
              value: "sun"

    day_time_start:
      name: Ura začetka dnevnega režima
      default: 8
      selector:
        number:
          min: 0
          max: 23
          step: 1

    day_time_end:
      name: Ura konca dnevnega režima
      default: 24
      selector:
        number:
          min: 0
          max: 24
          step: 1

triggers:
  - trigger: time_pattern
    minutes: !input interval

# Pogoj: Polnjenje mora biti vključeno (select = "on")
condition:
  - condition: state
    entity_id: !input charger_toggle
    state: "on"

action:
  - variables:
      voltage: !input voltage
      max_amps: !input max_amps
      min_amps: !input min_amps
      sensor_house_power_entity: !input sensor_house_power
      charging_current_entity: !input charging_current
      charger_toggle_entity: !input charger_toggle

      charging_current_value: "{{ states(charging_current_entity) | float(0) }}"
      total_consumption: "{{ states(sensor_house_power_entity) | float(0) }}"
      charger_consumption: "{{ charging_current_value * voltage if states(charger_toggle_entity) == 'on' else 0 }}"

      max_grid_power_day: !input max_grid_power_day
      max_grid_power_night: !input max_grid_power_night
      day_time_days: !input day_time_days
      day_time_start: !input day_time_start
      day_time_end: !input day_time_end

      current_day: "{{ ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'][now().weekday()] }}"
      is_day_time: "{{ current_day in day_time_days and day_time_start <= now().hour < day_time_end }}"

      actual_free_power: |-
        {% if is_day_time %}
          {{ [0, max_grid_power_day - total_consumption + charger_consumption] | max }}
        {% else %}
          {{ [0, max_grid_power_night - total_consumption + charger_consumption] | max }}
        {% endif %}

      new_target_value: >-
        {% set raw_amps = (actual_free_power / voltage) | float %}
        {% if raw_amps > max_amps %}
          {{ max_amps | float }}
        {% elif raw_amps < min_amps %}
          0.0
        {% else %}
          {{ raw_amps | int }}
        {% endif %}

  # Vklop / izklop polnjenja
  - service: select.select_option
    target:
      entity_id: !input charger_toggle
    data:
      option: |-
        {% if (actual_free_power / voltage) >= min_amps %}
          on
        {% else %}
          off
        {% endif %}

  # Postopno spreminjanje amperaže
  - repeat:
      while:
        - condition: template
          value_template: >-
            {% set current = states(charging_current_entity) | float(0) %}
            {% set target = new_target_value | float(0) %}
            {{ (current - target) | abs >= 1 }}
      sequence:
        - service: number.set_value
          target:
            entity_id: !input charging_current
          data:
            value: >-
              {% set current = states(charging_current_entity) | float(0) %}
              {% set target = new_target_value | float(0) %}
              {% if current < target %}
                {{ current + 1 }}
              {% elif current > target %}
                {{ [current - 1, min_amps] | max }}
              {% else %}
                {{ target }}
              {% endif %}
        - delay:
            seconds: 5

mode: restart
