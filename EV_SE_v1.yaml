blueprint:
  name: "Dinamično EV Polnjenje - Feyree & P1 (Solar Fix)"
  description: >
    **Seba Edition v2.2**
    - Odstranjen device_tracker (ne potrebuje lokacije)
    - Prilagojeno za Feyree (on/off ukazi)
    - Pripravljeno za P1 meter (negativne vrednosti = višek)
  
  domain: automation
  input:
    interval:
      name: Interval prilagajanja (minute)
      default: /3
      selector:
        select:
          options:
            - label: "1 minuta"
              value: /1
            - label: "3 minute"
              value: /3
            - label: "5 minut"
              value: /5  
    sensor_charging:
      name: Senzor stanja polnjenja
      description: "Senzor, ki pove ali se avto polni (npr. select.feyree_charging ali statusni senzor)."
      default: select.feyree_charging
      selector:
        entity:
          domain: [sensor, select]
    charger_toggle:
      name: Feyree Stikalo (on/off)
      description: "Select entiteta za vklop/izklop Feyree polnilnice."
      default: select.feyree_charging
      selector:
        entity:
          domain: select               
    sensor_house_power:
      name: P1 Meter Senzor (W)
      description: "Tvoj P1 števec. Pozitivno = poraba, Negativno = oddajanje v omrežje."
      default: sensor.p1_meter_power      
      selector:
        entity:
          domain: sensor
          device_class: power
    solar_charging_mode:
      name: Solar Mode Stikalo
      description: "Boolean stikalo za vklop 'samo sonce' načina."
      default: input_boolean.enable_solar_charge
      selector:
        entity:
          domain: input_boolean
    max_grid_power_day:
      name: Max moč iz omrežja - Dan (W)
      default: 4700
      selector:
        number:
          min: 0
          max: 15000
          step: 100
    max_grid_power_night:
      name: Max moč iz omrežja - Noč (W)
      default: 6200
      selector:
        number:
          min: 0
          max: 15000
          step: 100          
    charging_current:
      name: Nastavitev toka (A)
      default: number.feyree_set_charge_current
      selector:
        entity:
          domain: number
    voltage:
      name: Napetost (V)
      default: 230
      selector:
        number:
          min: 100
          max: 240
    max_amps:
      name: Max Amperov (A)
      default: 10
      selector:
        number:
          min: 6
          max: 15
    min_amps:
      name: Min Amperov (A)
      default: 6
      selector:
        number:
          min: 6
          max: 15
    day_time_days:
      name: Delovni dnevi (dan)
      default: [mon, tue, wed, thu, fri]
      selector:
        select:
          multiple: true
          options:
            - {label: "Monday", value: "mon"}
            - {label: "Tuesday", value: "tue"}
            - {label: "Wednesday", value: "wed"}
            - {label: "Thursday", value: "thu"}
            - {label: "Friday", value: "fri"}
            - {label: "Saturday", value: "sat"}
            - {label: "Sunday", value: "sun"}
    day_time_start:
      name: Začetek dnevne tarife (ura)
      default: 7
      selector:
        number: {min: 0, max: 23}
    day_time_end:
      name: Konec dnevne tarife (ura)
      default: 22
      selector:
        number: {min: 0, max: 24}

triggers:
  - trigger: time_pattern
    minutes: !input interval

condition:
  # Odstranjen device_tracker, ostaja samo preverjanje če je polnilnica aktivna
  - condition: template
    value_template: >
      {% set s = states(sensor_charging_entity) | lower %}
      {{ s in ['charging', 'charged', 'plugged_in', 'on'] }}

action:
  - variables:
      voltage: !input voltage
      max_amps: !input max_amps
      min_amps: !input min_amps
      sensor_house_power_entity: !input sensor_house_power
      charging_current_entity: !input charging_current
      sensor_charging_entity: !input sensor_charging
      solar_charging_entity: !input solar_charging_mode
      solar_charging_mode: "{{ states(solar_charging_entity) }}"
      charging_current_value: "{{ states(charging_current_entity) | float(0) }}"
      total_consumption: "{{ states(sensor_house_power_entity) | float(0) }}"
      
      charger_consumption: |-
        {% set state = states(sensor_charging_entity) | lower %}
        {% if state in ['charging', 'plugged_in', 'on'] %}
          {{ charging_current_value * voltage }}
        {% else %}
          0
        {% endif %}

      max_grid_power_day: !input max_grid_power_day
      max_grid_power_night: !input max_grid_power_night      
      current_day: "{{ ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'][now().weekday()] }}"
      is_day_time: "{{ current_day in !input day_time_days and !input day_time_start <= now().hour < !input day_time_end }}"  

      actual_free_power: |-
        {% if is_day_time %}
          {% if solar_charging_mode == 'on' %}
            {% if total_consumption < 0 %}
              {{ (total_consumption | float - charger_consumption | float) | abs }}
            {% else %}
              {{ 0 }}
            {% endif %}  
          {% else %}
            {{ [0, max_grid_power_day - total_consumption + charger_consumption] | max }}
          {% endif %}  
        {% else %}
          {{ [0, max_grid_power_night - total_consumption + charger_consumption] | max }}
        {% endif %}        

      new_target_value: >-
        {% set raw_amps = (actual_free_power / voltage) | float %}
        {% if raw_amps > max_amps %}
          {{ max_amps | float }}
        {% elif raw_amps < min_amps %}
          0.0
        {% else %}
          {{ raw_amps | int }}
        {% endif %}

  # KONTROLA VKLOPA (Feyree uporablja on/off)
  - service: select.select_option
    target:
      entity_id: !input charger_toggle
    data:
      option: |-
        {% if (actual_free_power / voltage) >= min_amps %}
          on
        {% else %}
          off
        {% endif %}    

  # STOPenjsko prilagajanje toka
  - repeat:
      while:
        - condition: template
          value_template: >-
            {% set current_amps = states(charging_current_entity) | float(0) %}
            {% set diff = (current_amps - (new_target_value | float)) | abs %}
            {{ diff >= 1 }}
      sequence:
        - service: number.set_value
          target:
            entity_id: !input charging_current
          data:
            value: >-
              {% set current_amps = states(charging_current_entity) | float(0) %}
              {% if current_amps < (new_target_value | float) %}
                {{ current_amps + 1 }}
              {% elif current_amps > (new_target_value | float) %}
                {{ [current_amps - 1, min_amps] | max }}
              {% else %}
                {{ new_target_value }}
              {% endif %}
        - delay:
            seconds: 5

mode: restart
